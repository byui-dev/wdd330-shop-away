<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Fishing Products</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>

<body>
  <header>
    <!-- Replace with actual header content or import via JS -->
    <h1>Shop Away</h1>
  </header>

  <main>
    <h2>My Fishing Products</h2>

    <!-- Tag Filter Form -->
    <form id="tag-filter-form">
      <label for="tag">Filter by tag:</label>
      <select name="tag" id="tag">
        <option value="">All</option>
        <option value="bass">Bass</option>
        <option value="gear">Gear</option>
        <option value="freshwater">Freshwater</option>
        <option value="trout">Trout</option>
      </select>
    </form>

    <!-- Product List -->
    <ul id="product-list">
      <li>
        <img src="/images/fishing_rod.png" width="100" alt="Fishing Rod" />
        <p>CarbonX Fishing Rod</p>
        <p>Lightweight carbon fiber rod with ergonomic grip.</p>
        <p>Price: 75.00 USD</p>
      </li>
      <li>
        <img src="/images/spin_reel.png" width="100" alt="Spin Reel" />
        <p>AquaSpin Reel</p>
        <p>High-speed spinning reel with anti-reverse system.</p>
        <p>Price: 60.00 USD</p>
      </li>
      <!-- Add more static or JS-rendered products -->
    </ul>

    <!-- Pagination -->
    <div class="pagination">
      <a href="#">Previous</a>
      <a href="#" class="active">1</a>
      <a href="#">2</a>
      <a href="#">Next</a>
    </div>
  </main>

  <script type="module" src="/assets/main.js"></script>
</body>

</html>
